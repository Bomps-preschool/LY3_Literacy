<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vowel Fun - A E I O U</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial Rounded MT Bold, Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#d7f5ff,#fff9d6);
overflow:hidden;
height:100vh;
border:6px solid gold;
}

/* Splash Screen */

#splashScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fffde7,#e3f2fd);
z-index:9999;
}

#splashScreen img{
width:220px;
max-width:70%;
margin-bottom:20px;
}

#splashTitle{
font-size:60px;
font-weight:bold;
color:#1565c0;
margin-bottom:10px;
}

#vowelPreview{
font-size:55px;
font-weight:bold;
letter-spacing:20px;
color:#ff6f00;
}

#loadingText{
margin-top:20px;
font-size:24px;
color:#555;
}

/* Game */

#gameContainer{
display:none;
height:100vh;
padding:15px;
flex-direction:column;
}

/* Top */

.topBar{
background:white;
border-radius:20px;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 12px rgba(0,0,0,.15);
margin-bottom:15px;
}

.scoreBox{
font-size:28px;
font-weight:bold;
color:#333;
}

.controlButtons{
display:flex;
gap:10px;
}

.controlButtons button{

padding:12px 18px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#4CAF50;
color:white;
transition:.25s;
}

.controlButtons button:hover{

transform:scale(1.05);

}

/* Question */

#questionArea{

text-align:center;

}

#questionText{

font-size:34px;
font-weight:bold;
color:#1565c0;
margin-bottom:10px;

}

#objectImage{

width:220px;
height:220px;
object-fit:contain;
background:white;
padding:12px;
border-radius:25px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:opacity .25s;

}

#objectName{

margin-top:15px;
font-size:46px;
font-weight:bold;
letter-spacing:5px;
color:#222;

}

.highlight{

color:#e53935;
text-decoration:underline;
text-decoration-color:gold;

}

/* Buttons */

#vowelButtons{

display:flex;
justify-content:center;
flex-wrap:wrap;
gap:18px;
margin-top:25px;

}

.vowelBtn{

width:95px;
height:95px;
border-radius:50%;
background:white;
border:5px solid #1976d2;
font-size:50px;
font-weight:bold;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
transition:.3s;

}

.vowelBtn:hover{

transform:scale(1.1);
background:#e3f2fd;

}

.correct{

background:#a5d6a7!important;
border-color:#2e7d32!important;
color:#1b5e20!important;

}

.wrong{

background:#ef9a9a!important;
border-color:#c62828!important;
color:#b71c1c!important;

}

.glow{

animation:glow 1s infinite;

}

@keyframes glow{

0%{box-shadow:0 0 5px gold;}

50%{box-shadow:0 0 35px gold;}

100%{box-shadow:0 0 5px gold;}

}

/* Retry */

#retryText{

text-align:center;
font-size:24px;
font-weight:bold;
margin-top:15px;
color:#ff6f00;

}

/* Confetti */

#confetti{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1000;

}

.confetti{

position:absolute;
width:12px;
height:12px;
animation:fall 3s linear forwards;

}

@keyframes fall{

0%{

transform:translateY(-30px) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(100vh) rotate(720deg);

opacity:0;

}

}

/* End Screen */

#endScreen{

display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#e8f5e9,#fff9c4);
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;

}

#endScreen h1{

font-size:60px;
color:#2e7d32;
margin-bottom:20px;

}

#finalScore{

font-size:36px;
margin-bottom:20px;

}

#playAgain{

padding:18px 40px;
font-size:24px;
border:none;
border-radius:15px;
background:#2e7d32;
color:white;
cursor:pointer;

}

/* Mobile */

@media(max-width:700px){

#objectImage{

width:150px;
height:150px;

}

#objectName{

font-size:34px;

}

#questionText{

font-size:26px;

}

.vowelBtn{

width:75px;
height:75px;
font-size:36px;

}

}

</style>

</head>

<body>

<div id="confetti"></div>

<!-- Splash -->

<div id="splashScreen">

<img src="Assets/innovinelogo.png">

<div id="splashTitle">
Vowel Fun!
</div>

<div id="vowelPreview">
A E I O U
</div>

<div id="loadingText">
Loading...
</div>

</div>

<!-- Game -->

<div id="gameContainer">

<div class="topBar">

<div class="scoreBox">
⭐ Score :
<span id="score">0</span>/10
</div>

<div class="controlButtons">

<button id="muteBtn">
🔊 Mute
</button>

<button id="restartBtn">
🔄 Restart
</button>

</div>

</div>

<div id="questionArea">

<div id="questionText"></div>

<img id="objectImage">

<div id="objectName"></div>

</div>

<div id="vowelButtons">

<div class="vowelBtn" data-vowel="A">A</div>
<div class="vowelBtn" data-vowel="E">E</div>
<div class="vowelBtn" data-vowel="I">I</div>
<div class="vowelBtn" data-vowel="O">O</div>
<div class="vowelBtn" data-vowel="U">U</div>

</div>

<div id="retryText">
Retry Remaining : 1
</div>

</div>

<!-- End Screen -->

<div id="endScreen">

<h1>
🎉 Amazing Job!
</h1>

<div id="finalScore"></div>

<button id="playAgain">
🔄 Play Again
</button>

</div>

<script>
// ==========================
// QUESTIONS
// ==========================

const questions = [

{
image:"apple.jpg",
word:"APPLE",
blank:0,
vowel:"A",
instruction:"What vowel is missing?"
},

{
image:"elephant.png",
word:"ELEPHANT",
blank:0,
vowel:"E",
instruction:"Find the missing vowel."
},

{
image:"fish.png",
word:"FISH",
blank:1,
vowel:"I",
instruction:"What vowel is missing?"
},

{
image:"orange.jpg",
word:"ORANGE",
blank:0,
vowel:"O",
instruction:"Find the missing vowel."
},

{
image:"umbrella.jpg",
word:"UMBRELLA",
blank:0,
vowel:"U",
instruction:"What vowel is missing?"
},

{
image:"ant.png",
word:"ANT",
blank:0,
vowel:"A",
instruction:"Find the missing vowel."
},

{
image:"egg.png",
word:"EGG",
blank:0,
vowel:"E",
instruction:"What vowel is missing?"
},

{
image:"icecubes.png",
word:"ICECUBES",
blank:0,
vowel:"I",
instruction:"Find the missing vowel."
},

{
image:"orangefruit.png",
word:"ORANGE",
blank:0,
vowel:"O",
instruction:"What vowel is missing?"
},

{
image:"unicycle.jpg",
word:"UNICYCLE",
blank:0,
vowel:"U",
instruction:"Find the missing vowel."
}

];

// ==========================
// AUDIO
// ==========================

const correctSound=new Audio("Assets/correct.mp3");
const wrongSound=new Audio("Assets/wrong.mp3");
const clapSound=new Audio("Assets/free_claps.mp3");

// ==========================
// VARIABLES
// ==========================

let currentQuestion=0;
let score=0;
let retry=1;
let attempts=0;
let muted=false;
let speakingTimer=null;
let imageCache={};

// ==========================
// ELEMENTS
// ==========================

const splashScreen=document.getElementById("splashScreen");
const gameContainer=document.getElementById("gameContainer");

const questionText=document.getElementById("questionText");
const objectImage=document.getElementById("objectImage");
const objectName=document.getElementById("objectName");

const retryText=document.getElementById("retryText");
const scoreText=document.getElementById("score");

const muteBtn=document.getElementById("muteBtn");
const restartBtn=document.getElementById("restartBtn");

const endScreen=document.getElementById("endScreen");
const finalScore=document.getElementById("finalScore");
const playAgain=document.getElementById("playAgain");

const vowelButtons=document.querySelectorAll(".vowelBtn");

// ==========================
// PRELOAD IMAGES
// ==========================

function preloadImages(){

return Promise.all(

questions.map(q=>{

return new Promise(resolve=>{

const img=new Image();

img.onload=()=>{

imageCache[q.image]=img;

resolve();

};

img.onerror=()=>{

console.log("Missing image : "+q.image);

resolve();

};

img.src="Assets/"+q.image;

});

})

);

}

// ==========================
// SPEECH
// ==========================

function speak(text){

if(muted) return;

speechSynthesis.cancel();

const speech=new SpeechSynthesisUtterance(text);

speech.rate=0.82;
speech.pitch=1.1;
speech.volume=1;

speechSynthesis.speak(speech);

}

function repeatSpeech(text){

clearInterval(speakingTimer);

speakingTimer=setInterval(()=>{

if(!muted){

speak(text);

}

},7000);

}

function stopSpeech(){

speechSynthesis.cancel();

clearInterval(speakingTimer);

}

// ==========================
// DISPLAY WORD
// ==========================

function makeBlankWord(question){

let word="";

for(let i=0;i<question.word.length;i++){

if(i===question.blank){

word+="<span class='highlight'>_</span>";

}

else{

word+=question.word[i];

}

}

return word;

}

function makeAnswerWord(question){

let word="";

for(let i=0;i<question.word.length;i++){

if(i===question.blank){

word+="<span class='highlight'>"+question.word[i]+"</span>";

}

else{

word+=question.word[i];

}

}

return word;

}
// =====================================
// LOAD QUESTION
// =====================================

function loadQuestion(){

attempts=0;
retry=1;

retryText.innerHTML="Retry Remaining : 1";

vowelButtons.forEach(btn=>{

btn.classList.remove("correct");
btn.classList.remove("wrong");
btn.classList.remove("glow");

});

const q=questions[currentQuestion];

questionText.innerHTML=q.instruction;

objectImage.style.opacity=0;

objectImage.onload=function(){

objectImage.style.opacity=1;

};

objectImage.src="Assets/"+q.image;

objectName.innerHTML=makeBlankWord(q);

const speechText=q.instruction+
" "+
q.word+
". What vowel is missing?";

speak(speechText);

repeatSpeech(speechText);

}

// =====================================
// CONFETTI
// =====================================

function launchConfetti(){

const container=document.getElementById("confetti");

for(let i=0;i<90;i++){

const piece=document.createElement("div");

piece.className="confetti";

piece.style.left=Math.random()*100+"%";

piece.style.background=
"hsl("+Math.random()*360+",100%,50%)";

piece.style.animationDuration=
(2+Math.random()*2)+"s";

container.appendChild(piece);

setTimeout(()=>{

piece.remove();

},4000);

}

}

// =====================================
// SHOW HINT
// =====================================

function showHint(){

const q=questions[currentQuestion];

const correctBtn=document.querySelector(

'.vowelBtn[data-vowel="'+q.vowel+'"]'

);

correctBtn.classList.add("glow");

}

// =====================================
// CHECK ANSWER
// =====================================

function checkAnswer(letter){

const q=questions[currentQuestion];

const selected=document.querySelector(

'.vowelBtn[data-vowel="'+letter+'"]'

);

if(letter===q.vowel){

handleCorrect(selected);

}

else{

handleWrong(selected);

}

}

// =====================================
// CORRECT ANSWER
// =====================================

function handleCorrect(button){

stopSpeech();

button.classList.add("correct");

correctSound.currentTime=0;
correctSound.play();

setTimeout(()=>{

clapSound.currentTime=0;
clapSound.play();

},500);

launchConfetti();

score++;

scoreText.innerHTML=score;

const q=questions[currentQuestion];

objectName.innerHTML=makeAnswerWord(q);

speak(

"Excellent! "+
q.word+
". The missing vowel is "+
q.vowel

);

setTimeout(()=>{

nextQuestion();

},2500);

}

// =====================================
// WRONG ANSWER
// =====================================

function handleWrong(button){

attempts++;

button.classList.add("wrong");

wrongSound.currentTime=0;
wrongSound.play();

setTimeout(()=>{

button.classList.remove("wrong");

},600);

if(attempts==1){

retry=0;

retryText.innerHTML=
"Retry Remaining : 0";

showHint();

speak("Try again.");

return;

}

showCorrectAnswer();

}

// =====================================
// SHOW CORRECT ANSWER
// =====================================

function showCorrectAnswer(){

stopSpeech();

const q=questions[currentQuestion];

const correctButton=document.querySelector(

'.vowelBtn[data-vowel="'+q.vowel+'"]'

);

correctButton.classList.remove("glow");

correctButton.classList.add("correct");

objectName.innerHTML=makeAnswerWord(q);

speak(

"The correct vowel is "+
q.vowel+
". "+
q.word

);

setTimeout(()=>{

nextQuestion();

},2500);

}
// =====================================
// NEXT QUESTION
// =====================================

function nextQuestion(){

currentQuestion++;

if(currentQuestion>=questions.length){

showEndScreen();

return;

}

loadQuestion();

}

// =====================================
// END SCREEN
// =====================================

function showEndScreen(){

stopSpeech();

gameContainer.style.display="none";

endScreen.style.display="flex";

finalScore.innerHTML=
"⭐ Your Score : "+score+" / "+questions.length+" ⭐";

launchConfetti();

speak(
"Congratulations! You finished the vowel game. Great job!"
);

}

// =====================================
// BUTTON EVENTS
// =====================================

// Vowel buttons

vowelButtons.forEach(button=>{

button.addEventListener("click",()=>{

checkAnswer(button.dataset.vowel);

});

});

// Play Again

playAgain.addEventListener("click",()=>{

speechSynthesis.cancel();

currentQuestion=0;

score=0;

attempts=0;

retry=1;

scoreText.innerHTML="0";

endScreen.style.display="none";

gameContainer.style.display="flex";

loadQuestion();

});

// Restart

restartBtn.addEventListener("click",()=>{

speechSynthesis.cancel();

currentQuestion=0;

score=0;

attempts=0;

retry=1;

scoreText.innerHTML="0";

loadQuestion();

});

// Mute

muteBtn.addEventListener("click",()=>{

muted=!muted;

if(muted){

speechSynthesis.cancel();

clearInterval(speakingTimer);

muteBtn.innerHTML="🔇 Unmute";

}

else{

muteBtn.innerHTML="🔊 Mute";

const q=questions[currentQuestion];

const text=q.instruction+
" "+
q.word+
". What vowel is missing?";

speak(text);

repeatSpeech(text);

}

});

// =====================================
// KEYBOARD SUPPORT
// =====================================

document.addEventListener("keydown",e=>{

const key=e.key.toUpperCase();

if(["A","E","I","O","U"].includes(key)){

checkAnswer(key);

}

if(key==="M"){

muteBtn.click();

}

if(key==="R"){

restartBtn.click();

}

});

// =====================================
// START GAME
// =====================================

async function startGame(){

await preloadImages();

setTimeout(()=>{

splashScreen.style.display="none";

gameContainer.style.display="flex";

loadQuestion();

},2500);

}

// =====================================
// INITIALISE
// =====================================

scoreText.innerHTML="0";

startGame();

</script>

</body>
</html>
